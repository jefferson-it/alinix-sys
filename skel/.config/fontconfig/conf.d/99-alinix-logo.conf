<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Fallback para U+E000 (PUA): usa AlinixLogo-Regular -->
  <match target="pattern">
    <test name="family"><string>Monospace</string></test>
    <edit name="family" mode="append">
      <string>AlinixLogo</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="family"><string>monospace</string></test>
    <edit name="family" mode="append">
      <string>AlinixLogo</string>
    </edit>
  </match>
</fontconfig>
