<touchégg>
  <settings>
    <!-- Delay antes de iniciar animação de gesto (ms) -->
    <property name="animation_delay">150</property>
    <!-- Delay antes de executar a ação (ms) -->
    <property name="action_delay">150</property>
  </settings>

  <application name="All">

    <!-- ══════════════════════════════════════════════════════════════════
         GESTOS DE 3 DEDOS — Alternar entre janelas (Alt+Tab)
         Especificado em app-schema/erasshell.md §3
    ══════════════════════════════════════════════════════════════════════ -->

    <!-- 3 dedos → esquerda: avança na lista (Alt+Tab) -->
    <gesture type="SWIPE" fingers="3" direction="LEFT">
      <action type="SEND_KEYS">
        <repeat>false</repeat>
        <modifiers>Alt_L</modifiers>
        <keys>Tab</keys>
        <on>begin</on>
      </action>
    </gesture>

    <!-- 3 dedos → direita: volta na lista (Alt+Shift+Tab) -->
    <gesture type="SWIPE" fingers="3" direction="RIGHT">
      <action type="SEND_KEYS">
        <repeat>false</repeat>
        <modifiers>Alt_L</modifiers>
        <keys>Shift_L+Tab</keys>
        <on>begin</on>
      </action>
    </gesture>

    <!-- 3 dedos → cima: abre a visão geral de atividades -->
    <gesture type="SWIPE" fingers="3" direction="UP">
      <action type="SEND_KEYS">
        <repeat>false</repeat>
        <modifiers></modifiers>
        <keys>super</keys>
        <on>begin</on>
      </action>
    </gesture>

    <!-- 3 dedos → baixo: mostra a área de trabalho (minimiza tudo) -->
    <gesture type="SWIPE" fingers="3" direction="DOWN">
      <action type="SEND_KEYS">
        <repeat>false</repeat>
        <modifiers>Super_L</modifiers>
        <keys>d</keys>
        <on>begin</on>
      </action>
    </gesture>

    <!-- 3 dedos duplo toque: abre/fecha notificações -->
    <gesture type="TAP" fingers="3">
      <action type="SEND_KEYS">
        <repeat>false</repeat>
        <modifiers>Super_L</modifiers>
        <keys>v</keys>
        <on>begin</on>
      </action>
    </gesture>

    <!-- ══════════════════════════════════════════════════════════════════
         GESTOS DE 4 DEDOS — Mudar de workspace (⌘+←/→)
    ══════════════════════════════════════════════════════════════════════ -->

    <!-- 4 dedos → esquerda: workspace anterior -->
    <gesture type="SWIPE" fingers="4" direction="LEFT">
      <action type="SEND_KEYS">
        <repeat>false</repeat>
        <modifiers>Super_L</modifiers>
        <keys>Left</keys>
        <on>begin</on>
      </action>
    </gesture>

    <!-- 4 dedos → direita: próximo workspace -->
    <gesture type="SWIPE" fingers="4" direction="RIGHT">
      <action type="SEND_KEYS">
        <repeat>false</repeat>
        <modifiers>Super_L</modifiers>
        <keys>Right</keys>
        <on>begin</on>
      </action>
    </gesture>

    <!-- 4 dedos → cima: abre o lançador Alí -->
    <gesture type="SWIPE" fingers="4" direction="UP">
      <action type="SEND_KEYS">
        <repeat>false</repeat>
        <modifiers></modifiers>
        <keys>super</keys>
        <on>begin</on>
      </action>
    </gesture>

    <!-- ══════════════════════════════════════════════════════════════════
         GESTOS DE 2 DEDOS — Navegação de página (voltar/avançar)
         Ativo em: navegador, gerenciador de arquivos
    ══════════════════════════════════════════════════════════════════════ -->

    <!-- 2 dedos → esquerda: voltar página (Alt+Left) -->
    <gesture type="SWIPE" fingers="2" direction="LEFT">
      <action type="SEND_KEYS">
        <repeat>false</repeat>
        <modifiers>Alt_L</modifiers>
        <keys>Left</keys>
        <on>begin</on>
      </action>
    </gesture>

    <!-- 2 dedos → direita: avançar página (Alt+Right) -->
    <gesture type="SWIPE" fingers="2" direction="RIGHT">
      <action type="SEND_KEYS">
        <repeat>false</repeat>
        <modifiers>Alt_L</modifiers>
        <keys>Right</keys>
        <on>begin</on>
      </action>
    </gesture>

    <!-- ══════════════════════════════════════════════════════════════════
         GESTOS DE PINÇA — Minimizar / Maximizar
         Pinch in (juntar dedos) → minimizar
         Pinch out (afastar dedos) → maximizar
    ══════════════════════════════════════════════════════════════════════ -->

    <!-- 2 dedos pinch IN → minimizar janela ativa (⌘+H) -->
    <gesture type="PINCH" fingers="2" direction="IN">
      <action type="SEND_KEYS">
        <repeat>false</repeat>
        <modifiers>Super_L</modifiers>
        <keys>h</keys>
        <on>end</on>
      </action>
    </gesture>

    <!-- 2 dedos pinch OUT → maximizar janela ativa (⌘+↑) -->
    <gesture type="PINCH" fingers="2" direction="OUT">
      <action type="SEND_KEYS">
        <repeat>false</repeat>
        <modifiers>Super_L</modifiers>
        <keys>Up</keys>
        <on>end</on>
      </action>
    </gesture>

  </application>
</touchégg>
